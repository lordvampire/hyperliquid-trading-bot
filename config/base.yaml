strategies:
  strategy_b:
    fast_period: 5
    slow_period: 20
    rsi_period: 14
    momentum_weight: 0.50
    rsi_weight: 0.30
    volume_weight: 0.20
    entry_threshold: 0.40
    exit_threshold: 0.15
    stop_pct: 0.02
    tp_pct: 0.04

position_sizing:
  max_position_pct: 0.20      # max 20% of balance per trade
  base_size_pct: 0.10         # base 10% of balance
  volatility_scale: 0.5       # scaling factor for volatility adjustment
  leverage_cap: 5.0           # max leverage multiplier

backtest:
  mode: backtest
  slippage_pct: 0.08          # 0.08% slippage
  spread_pct: 0.05            # 0.05% spread
  maker_fee: 0.02             # 0.02% maker fee
  taker_fee: 0.05             # 0.05% taker fee (normal fill)
  starting_balance: 1000

paper:
  mode: paper

live:
  mode: live

optimization:
  sensitivity_variations: [0.7, 0.8, 0.9, 1.0, 1.1, 1.2, 1.3]  # ±30% steps
  grid_search_values_per_param: 7
  optuna_trials: 50
  optuna_sampler: "tpe"           # Tree-structured Parzen Estimator (Bayesian)
  walk_forward_windows: 3
  consistency_threshold: 0.3     # Sharpe std dev max
  min_win_rate: 0.45
  max_drawdown_limit: 0.15

paper_trading:
  duration_days: 14
  starting_balance: 1000.0

safety:
  max_daily_dd_pct: 5.0
  max_leverage: 35
  max_slippage_pct: 2.0
  network_latency_limit_ms: 2000
  audit_log_path: "logs/audit.log"

deployment:
  strategy: "strategy_b"
  mode: "backtest"          # backtest | paper | live
  starting_capital: 1000.0
  registry_path: "param_history.json"
  email_reports: true
  report_time_utc: "18:00"  # 6 PM UTC = 7 PM Berlin

telegram:
  admin_user_ids: [5890731372]  # Faruk's Telegram ID
